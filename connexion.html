<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — TourismeMaroc</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="form-page">
  <div class="zellige-bg"></div>
  <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Retour à l'accueil</a>

  <div class="form-card">
    <h2>Connexion</h2>
    <p class="sub">Accédez à votre espace pour gérer vos réservations.</p>

    <!-- Submits to php/login.php. Client-side validation handled in js/script.js -->
    <form id="loginForm" action="php/login.php" method="POST" novalidate>
      <div class="form-group" id="group-email">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="vous@exemple.com">
        <span class="error-text">Veuillez saisir une adresse e-mail valide.</span>
      </div>

      <div class="form-group" id="group-password">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Votre mot de passe">
        <span class="error-text">Le mot de passe est requis.</span>
      </div>

      <button type="submit" class="btn btn-primary">Se connecter</button>
    </form>

    <div class="form-footer">
      Pas encore de compte ? <a href="inscription.html">Inscrivez-vous</a>
    </div>
  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
